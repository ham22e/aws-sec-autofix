<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>탐지·조치 현황 · AWS 보안 설정 자동 조치</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="shell">

  <header class="topbar">
    <div>
      <p class="eyebrow">AWS 보안 설정 자동 조치</p>
      <h1>탐지·조치 현황</h1>
    </div>

    <div class="controls">
      <div class="rangepick" role="group" aria-label="조회 기간">
        <button type="button" data-range="1h">1시간</button>
        <button type="button" data-range="24h" aria-pressed="true">24시간</button>
        <button type="button" data-range="7d">7일</button>
      </div>
      <button type="button" id="refresh" class="btn">새로고침</button>
    </div>
  </header>

  <p class="meta" id="meta">불러오는 중</p>

  <p class="banner" id="sample-banner" hidden>
    샘플 데이터를 보고 있다. AWS 를 조회하지 않는다.
    실제 현황을 보려면 <code>--sample</code> 없이 실행하라.
  </p>

  <div class="alerts" id="alerts" hidden></div>

  <section class="kpis">
    <article class="panel">
      <p class="panel-label">준수 상태</p>

      <div class="rate">
        <span class="rate-num" id="rate">–</span>
        <span class="rate-unit">%</span>
        <span class="rate-caption">Config 규칙 준수율</span>
      </div>

      <div class="strip" id="strip"></div>

      <dl class="tally" id="tally"></dl>
    </article>

    <article class="panel">
      <p class="panel-label">조치 이벤트 <span class="panel-note" id="range-note"></span></p>

      <div class="rate">
        <span class="rate-num" id="event-total">–</span>
        <span class="rate-caption">건의 조치가 기록됐다</span>
      </div>

      <div class="stack" id="stack"></div>

      <dl class="tally" id="event-tally"></dl>
    </article>
  </section>

  <section>
    <h2 class="section-label">통제 시나리오</h2>
    <div class="cards" id="cards"></div>
  </section>

  <section>
    <h2 class="section-label">조치 타임라인</h2>
    <div class="tablewrap">
      <table class="log">
        <thead>
          <tr>
            <th scope="col">시각</th>
            <th scope="col">통제</th>
            <th scope="col">상태</th>
            <th scope="col">대상</th>
            <th scope="col">상세</th>
          </tr>
        </thead>
        <tbody id="timeline"></tbody>
      </table>
    </div>
  </section>

  <footer class="foot">
    <p>
      이 대시보드는 AWS Config 와 CloudWatch Logs 를 직접 읽는다.
      같은 사실을 커스텀 메트릭으로 보는 CloudWatch 대시보드와 병행 운영한다.
    </p>
    <a id="cw-link" class="cw-link" href="#" target="_blank" rel="noopener" hidden>
      CloudWatch 대시보드 열기
    </a>
  </footer>

</div>

<script src="/app.js"></script>
</body>
</html>
